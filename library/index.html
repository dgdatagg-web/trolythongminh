    flow:["Lắng nghe","Chọn loại","Đặt câu hỏi","Chờ","Đi sâu"], rule:"Câu hỏi đúng > đáp án đúng.", why:"AI không chỉ trả lời — AI biết hỏi câu khiến bạn tự tìm ra đáp án.", pairsWith:["AI Companion","Pattern Reader","Self-Discovery","Foundations"] },

  { id:"models", icon:"🎯", name:"Life Models", grade:"A", gradeClass:"a", type:"soft", subtitle:"Mô hình quản lý cuộc sống", desc:"Life cycle, strategy model, problem solving, communication power.", category:"soft-coaching", tags:["mô hình","problem solving","communication"],
    how:`<ol><li><strong>Life cycle</strong> — quản lý các giai đoạn cuộc sống</li><li><strong>Problem solving</strong> — framework giải quyết vấn đề</li><li><strong>Communication</strong> — sức mạnh giao tiếp</li></ol>`,
    flow:["Tình huống","Chọn model","Áp dụng","Đánh giá","Điều chỉnh"], rule:"Mô hình là bản đồ, không phải lãnh thổ. Linh hoạt.", why:"Framework sẵn sàng cho mọi tình huống — không cần nghĩ từ đầu.", pairsWith:["Strategy","Foundations","Action Plans"] },

  { id:"action-plans", icon:"📋", name:"Action Plans", grade:"A", gradeClass:"a", type:"soft", subtitle:"Kế hoạch hành động", desc:"SMART goals, breakdown 7/30/90 ngày, cấu trúc hàng ngày.", category:"soft-coaching", tags:["kế hoạch","SMART","goals"],
    how:`<ol><li><strong>SMART</strong> — Specific, Measurable, Achievable, Relevant, Time-bound</li><li><strong>7/30/90</strong> — chia nhỏ theo tuần/tháng/quý</li><li><strong>Daily</strong> — cấu trúc ngày để đạt goals</li></ol>`,
    flow:["Mục tiêu","SMART","Breakdown","Daily plan","Review"], rule:"Kế hoạch không review = giấy vụn.", why:"AI biến mục tiêu mơ hồ thành kế hoạch cụ thể từng ngày.", pairsWith:["Accountability","Strategy","Self-Discovery","Assessment"] },

  { id:"accountability", icon:"✅", name:"Accountability", grade:"A", gradeClass:"a", type:"soft", subtitle:"Theo dõi cam kết", desc:"Commitment tracking, follow-through, escalation patterns.", category:"soft-coaching", tags:["cam kết","follow-through","kỷ luật"],
    how:`<ol><li><strong>Track</strong> — ghi nhận mọi cam kết</li><li><strong>Follow</strong> — nhắc nhở, check progress</li><li><strong>Escalate</strong> — cảnh báo khi trễ deadline</li></ol>`,
    flow:["Cam kết","Ghi nhận","Nhắc","Check","Đánh giá"], rule:"Không phán xét. Chỉ mirror sự thật.", why:"AI accountability partner — không nể nang, không quên, không bỏ cuộc.", pairsWith:["Action Plans","Pattern Reader","Commitment Tracker"] },

  { id:"resource-finder", icon:"🧭", name:"Resource Finder", grade:"B", gradeClass:"b", type:"soft", subtitle:"Tìm tài nguyên phù hợp", desc:"Tools, courses, communities, templates, funding — match với nhu cầu.", category:"soft-coaching", tags:["tài nguyên","courses","tools"],
    how:`<ol><li><strong>Phân tích nhu cầu</strong> — bạn cần gì?</li><li><strong>Match</strong> — tìm resources phù hợp</li><li><strong>Recommend</strong> — xếp hạng theo relevance</li></ol>`,
    flow:["Nhu cầu","Tìm kiếm","Match","Recommend","Follow up"], rule:"Chất lượng > số lượng. 3 resources tốt > 30 resources random.", why:"AI biết bạn cần gì và tìm đúng resource — không phải Google rồi đoán.", pairsWith:["Strategy","Self-Discovery","Pro Tools"] },
];

const combos = [
  { name:"🍜 F&B Complete", forText:"Cho nhà hàng, quán cafe, bar", skills:["Quản Lý Bếp","Quản Lý Bar","HR & Nhân Sự","Schedule Manager","Finance","Report Engine","Alert Engine","Google Drive"], why:"Bộ skill hoàn chỉnh để vận hành F&B. AI quản lý từ bếp đến bàn, từ chấm công đến doanh thu." },
  { name:"🚀 Startup Builder", forText:"Cho founder không biết code", skills:["Code Builder","DevOps","Git Ops","Strategy","Financial Lens","Content Engine","Session Memory"], why:"Từ ý tưởng đến sản phẩm. AI code, deploy, và giúp chiến lược kinh doanh." },
  { name:"💼 SME Manager", forText:"Cho chủ doanh nghiệp nhỏ", skills:["Manager Dashboard","HR & Nhân Sự","Finance","Report Engine","Strategy","Alert Engine","Google Drive"], why:"Quản lý nhân sự, tài chính, báo cáo — tất cả qua một AI manager." },
  { name:"🧠 Life Coach", forText:"Cho phát triển cá nhân", skills:["AI Companion","Foundations","Self-Discovery","Assessment","Inquiry Engine","Action Plans","Accountability","Pattern Reader"], why:"AI life coach biết bạn sâu hơn bạn biết mình. Session after session." },
  { name:"📈 Marketing Pro", forText:"Cho team marketing", skills:["AI CMO","Content Engine","Community Intel","Strategy","Financial Lens","Pro Tools"], why:"CMO + content writer + analyst trong một AI. 24/7, không nghỉ phép." },
  { name:"🤝 Personal Companion", forText:"Cho đồng hành cá nhân", skills:["AI Companion","Pattern Reader","Commitment Tracker","Wisdom","Session Memory"], why:"AI bạn đồng hành — nhớ bạn, hiểu bạn, phát triển cùng bạn qua thời gian." },
];

// Render sections
const sections = document.getElementById('sections');
const categories = [
  { key:'core', label:'Cốt Lõi', badge:'badge-core', desc:'Kỹ năng nền tảng mà mọi agent đều cần.' },
  { key:'hard-ops', label:'Hard Skills — Vận Hành', badge:'badge-hard', desc:'Quản lý vận hành doanh nghiệp hàng ngày.' },
  { key:'hard-tech', label:'Hard Skills — Kỹ Thuật', badge:'badge-hard', desc:'Code, deploy, tích hợp hệ thống.' },
  { key:'hard-biz', label:'Hard Skills — Kinh Doanh', badge:'badge-hard', desc:'Marketing, tài chính, chiến lược.' },
  { key:'soft-companion', label:'Soft Skills — Companion', badge:'badge-soft', desc:'Kết nối, hiểu người, đồng hành.' },
  { key:'soft-growth', label:'Soft Skills — Phát Triển', badge:'badge-soft', desc:'Khám phá bản thân, xây nền tảng.' },
  { key:'soft-coaching', label:'Soft Skills — Coaching', badge:'badge-soft', desc:'Đánh giá, kế hoạch, theo dõi cam kết.' },
];

categories.forEach(cat => {
  const catSkills = skills.filter(s => s.category === cat.key);
  if (!catSkills.length) return;
  const sec = document.createElement('div');
  sec.className = 'category-section';
  sec.dataset.category = cat.key;
  sec.innerHTML = `
    <div class="category-header">
      <h2>${cat.label}</h2>
      <span class="category-badge ${cat.badge}">${catSkills.length} SKILLS</span>
    </div>
    <p class="category-desc">${cat.desc}</p>
    <div class="grid">${catSkills.map(s => `
      <div class="skill-card" data-id="${s.id}" data-category="${s.category}" style="--grade-color:${s.gradeClass==='s'?'#facc15':s.gradeClass==='ss'?'#fb923c':s.gradeClass==='sss'?'#f43f5e':s.gradeClass==='b'?'#4ade80':'#22d3ee'}">
        <div class="card-top">
          <div class="card-icon ${s.type==='soft'?'soft':''}">${s.icon}</div>
          <span class="card-grade ${s.gradeClass}">${s.grade}</span>
        </div>
        <h3>${s.name}</h3>
        <p class="desc">${s.desc}</p>
        <div class="card-tags">${s.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}</div>
      </div>
    `).join('')}</div>
  `;
  sections.appendChild(sec);
});

// Combo section
const comboSec = document.createElement('div');
comboSec.className = 'combo-section';
comboSec.innerHTML = `
  <div class="category-header"><h2>🔥 Combo Gợi Ý</h2><span class="category-badge badge-combo">${combos.length} COMBOS</span></div>
  <p class="category-desc">Những bộ skill đã được test và hoạt động tốt cùng nhau.</p>
  <div class="combo-grid">${combos.map(c => `
    <div class="combo-card">
      <h3>${c.name}</h3>
      <p class="combo-for">${c.forText}</p>
      <div class="combo-skills">${c.skills.map(s => `<span class="combo-skill">${s}</span>`).join('')}</div>
      <p class="why">${c.why}</p>
    </div>
  `).join('')}</div>
`;
sections.appendChild(comboSec);

// Click handlers
document.querySelectorAll('.skill-card').forEach(card => {
  card.addEventListener('click', () => {
    const s = skills.find(sk => sk.id === card.dataset.id);
    if (s) openModal(s);
  });
});

// Filter
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const f = btn.dataset.filter;
    document.querySelectorAll('.category-section').forEach(sec => {
      sec.style.display = (f === 'all' || sec.dataset.category === f) ? '' : 'none';
    });
    document.querySelector('.combo-section').style.display = f === 'all' ? '' : 'none';
  });
});

// Modal
const overlay = document.getElementById('modal-overlay');
function openModal(s) {
  document.getElementById('modal-icon').textContent = s.icon;
  document.getElementById('modal-meta').innerHTML = `
    <span class="card-grade ${s.gradeClass}">${s.grade}</span>
    <span class="category-badge ${s.type==='soft'?'badge-soft':'badge-hard'}" style="font-size:9px;">${s.type==='soft'?'SOFT SKILL':'HARD SKILL'}</span>
  `;
  document.getElementById('modal-title').textContent = s.name;
  document.getElementById('modal-subtitle').textContent = s.subtitle;
  
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-section"><h4>Cơ Chế Hoạt Động</h4>${s.how}</div>
    <div class="modal-section"><h4>Quy Trình</h4>
      <div class="modal-flow">${s.flow.map((step, i) => `<span class="step">${step}</span>${i < s.flow.length - 1 ? '<span class="arrow">→</span>' : ''}`).join('')}</div>
    </div>
    <div class="modal-section"><h4>Tại Sao Hiệu Quả</h4><p>${s.why}</p></div>
    <div class="modal-section"><div class="highlight"><strong>Luật:</strong> ${s.rule}</div></div>
    ${s.pairsWith ? `<div class="modal-suggestion"><h5>🔗 Kết hợp tốt với</h5><div class="suggest-items">${s.pairsWith.map(p => `<span class="suggest-item">${p}</span>`).join('')}</div></div>` : ''}
    <div class="activate-section">
      <div class="activate-label">Kích Hoạt Skill</div>
      <div class="activate-success" id="activate-success-${s.id}">✅ Đã lưu! Skill <strong>${s.name}</strong> sẽ được kích hoạt cho Agent của bạn.</div>
      <div class="activate-input-row" id="activate-row-${s.id}">
        <input type="text" class="activate-input" id="agent-id-${s.id}" placeholder="Nhập Agent ID của bạn..." />
        <button class="activate-btn" onclick="activateSkill('${s.id}', '${s.name}')">Kích Hoạt →</button>
      </div>
      <a href="https://myclaw.vn/activate?utm_source=trolythongminh&utm_medium=library&utm_campaign=skill_${s.id}" class="activate-create">🚀 Tạo Agent AI Của Bạn →</a>
    </div>
  `;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function activateSkill(skillId, skillName) {
  const input = document.getElementById('agent-id-' + skillId);
  const agentId = input.value.trim();
  if (!agentId) { input.focus(); input.style.borderColor = '#f43f5e'; setTimeout(() => input.style.borderColor = '', 1500); return; }
  const activations = JSON.parse(localStorage.getItem('skill_activations') || '[]');
  activations.push({ skillId, skillName, agentId, timestamp: new Date().toISOString() });
  localStorage.setItem('skill_activations', JSON.stringify(activations));
  document.getElementById('activate-success-' + skillId).style.display = 'block';
  document.getElementById('activate-row-' + skillId).style.display = 'none';
}

document.getElementById('modal-close').addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
function closeModal() { overlay.classList.remove('open'); document.body.style.overflow = ''; }
</script>
</body>
</html>
