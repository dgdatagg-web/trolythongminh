    desc: "Theo dõi sức khỏe tất cả AI agent, phát hiện lỗi, cảnh báo tự động.",
    category: "core",
    tags: ["monitoring", "health", "cảnh báo"],
    how: `<p>Hệ thống giám sát fleet hoạt động 24/7:</p>
<ol>

  <li><strong>Cảnh báo</strong> — phát hiện agent offline, memory bloat, config sai — báo ngay lập tức</li>
  <li><strong>Dự đoán</strong> — phân tích xu hướng, dự đoán lỗi trước khi xảy ra</li>
</ol>`,
    flow: ["Scan", "Phát hiện", "Phân tích", "Cảnh báo", "Khắc phục"],
    rule: "Quan sát trước, kết luận sau. Không bao giờ đoán khi có thể kiểm tra.",
    why: "Predictive, not reactive. Phát hiện vấn đề trước khi khách hàng nhận ra."
  },
  {
    id: "drive-sheets",
    icon: "📊",
    name: "Google Drive & Sheets",
    grade: "A",
    gradeClass: "a",
    subtitle: "Kết nối Google Workspace",
    desc: "Đọc/ghi Google Sheets, tạo Docs, quản lý Drive — tất cả qua chat.",
    category: "ops",
    tags: ["Google", "Sheets", "Drive", "tự động"],
    how: `<p>AI kết nối trực tiếp Google Workspace:</p>

</ol>`,
    flow: ["Nhận yêu cầu", "Kết nối API", "Xử lý", "Cập nhật", "Xác nhận"],

    why: "Không cần mở laptop. Hỏi AI: 'Doanh thu tháng này bao nhiêu?' — có số liệu ngay."
  }
];

// Render grid
const grid = document.getElementById('skill-grid');
skills.forEach(s => {
  const card = document.createElement('div');
  card.className = 'skill-card';
  card.dataset.category = s.category;
  card.dataset.id = s.id;
  card.style.setProperty('--grade-color', 
    s.gradeClass === 's' ? '#facc15' : 
    s.gradeClass === 'ss' ? '#fb923c' : 
    s.gradeClass === 'sss' ? '#f43f5e' : '#22d3ee');
  card.innerHTML = `
    <div class="card-top">
      <div class="card-icon">${s.icon}</div>
      <span class="card-grade ${s.gradeClass}">${s.grade}</span>
    </div>
    <h3>${s.name}</h3>
    <p class="desc">${s.desc}</p>
    <div class="card-tags">${s.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}</div>
  `;
  card.addEventListener('click', () => openModal(s));
  grid.appendChild(card);
});

// Filter
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const f = btn.dataset.filter;
    document.querySelectorAll('.skill-card').forEach(card => {
      card.style.display = (f === 'all' || card.dataset.category === f) ? '' : 'none';
    });
  });
});

// Modal
const overlay = document.getElementById('modal-overlay');
const modal = document.getElementById('modal');
function openModal(s) {
  document.getElementById('modal-icon').textContent = s.icon;
  document.getElementById('modal-grade').textContent = s.grade;
  document.getElementById('modal-grade').className = `card-grade ${s.gradeClass}`;
  document.getElementById('modal-title').textContent = s.name;
  document.getElementById('modal-subtitle').textContent = s.subtitle;
  
  let body = `
    <div class="modal-section">
      <h4>Cơ Chế Hoạt Động</h4>
      ${s.how}
    </div>
    <div class="modal-section">
      <h4>Quy Trình</h4>
      <div class="modal-flow">
        ${s.flow.map((step, i) => 
          `<span class="step">${step}</span>${i < s.flow.length - 1 ? '<span class="arrow">→</span>' : ''}`
        ).join('')}
      </div>
    </div>
    <div class="modal-section">
      <h4>Tại Sao Hiệu Quả</h4>
      <p>${s.why}</p>
    </div>
    <div class="modal-section">
      <div class="highlight">
        <strong>Luật duy nhất:</strong> ${s.rule}
      </div>
    </div>
    <a href="https://myclaw.vn/activate?utm_source=trolythongminh&utm_medium=library&utm_campaign=skill_${s.id}" class="modal-cta" style="display:none;">Kích Hoạt Skill Này →</a>
    <div class="activate-section">
      <div class="activate-label">Kích Hoạt Skill</div>
      <div class="activate-success" id="activate-success-${s.id}">✅ Đã lưu! Skill <strong>${s.name}</strong> sẽ được kích hoạt cho Agent của bạn.</div>
      <div class="activate-input-row" id="activate-row-${s.id}">
        <input type="text" class="activate-input" id="agent-id-${s.id}" placeholder="Nhập Agent ID của bạn..." />
        <button class="activate-btn" onclick="activateSkill('${s.id}', '${s.name}')">Kích Hoạt →</button>
      </div>
      <a href="https://myclaw.vn/activate?utm_source=trolythongminh&utm_medium=library&utm_campaign=skill_${s.id}" class="activate-create">🚀 Tạo Agent AI Của Bạn →</a>
    </div>
  `;
  document.getElementById('modal-body').innerHTML = body;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function activateSkill(skillId, skillName) {
  const input = document.getElementById('agent-id-' + skillId);
  const agentId = input.value.trim();
  if (!agentId) { input.focus(); input.style.borderColor = '#f43f5e'; setTimeout(() => input.style.borderColor = '', 1500); return; }
  
  // Store activation (localStorage for now — will integrate with backend later)
  const activations = JSON.parse(localStorage.getItem('skill_activations') || '[]');
  activations.push({ skillId, skillName, agentId, timestamp: new Date().toISOString() });
  localStorage.setItem('skill_activations', JSON.stringify(activations));
  
  // Show success
  const successEl = document.getElementById('activate-success-' + skillId);
  const rowEl = document.getElementById('activate-row-' + skillId);
  successEl.style.display = 'block';
  rowEl.style.display = 'none';
}

document.getElementById('modal-close').addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
function closeModal() {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}
</script>
</body>
</html>
