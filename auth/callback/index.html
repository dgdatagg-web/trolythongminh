<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Authenticating... — NOVA AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#080d16;color:#e2e8f0;font-family:'Space Grotesk',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .card{text-align:center;padding:48px 40px;max-width:420px;}
    .logo{font-size:28px;font-weight:900;letter-spacing:-1px;margin-bottom:32px;}
    .logo span{color:#22d3ee;}
    .spinner{width:48px;height:48px;border:3px solid rgba(34,211,238,.2);border-top-color:#22d3ee;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 24px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    h2{font-size:20px;font-weight:700;margin-bottom:10px;}
    p{color:#64748b;font-size:14px;line-height:1.6;}
    .success{display:none;flex-direction:column;align-items:center;gap:16px;}
    .check{width:56px;height:56px;background:rgba(34,211,238,.1);border:2px solid rgba(34,211,238,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 8px;}
    .error-block{display:none;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:12px;padding:16px;margin-top:20px;}
    .error-block p{color:#fca5a5;}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">NOVA <span>⚡</span></div>

  <div id="loading">
    <div class="spinner"></div>
    <h2>Authenticating...</h2>
    <p>Please wait while we verify your identity.<br/>This will only take a moment.</p>
  </div>

  <div class="success" id="success">
    <div class="check">✓</div>
    <h2>Connected!</h2>
    <p>Authentication successful. You can close this window and return to Telegram.</p>
  </div>

  <div class="error-block" id="error">
    <p id="error-msg">Authentication failed. Please try again or contact support at <a href="https://t.me/willdaolam" style="color:#22d3ee;">@willdaolam</a>.</p>
  </div>
</div>

<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');
  const state = params.get('state');

  if (error) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error-msg').textContent = 'Authentication denied: ' + error + '. Please try again or contact @willdaolam on Telegram.';
    return;
  }

  if (code) {
    // OAuth code received — show success after brief delay
    setTimeout(() => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('success').style.display = 'flex';
    }, 1500);

    // Optionally redirect back
    const redirect = sessionStorage.getItem('oauth_redirect') || '/';
    setTimeout(() => { window.location.href = redirect; }, 4000);
  } else {
    // No code and no error — likely direct navigation
    setTimeout(() => { window.location.href = '/'; }, 2000);
  }
})();
</script>
</body>
</html>
